<meta itemprop="name" content="Vertical">
<meta itemprop="description" content="Progress stepper in vertical orientation.">

<chickadee-progress-stepper orientation="vertical">
  <chickadee-progress-step state="complete" description="Completed successfully">
    Complete
  </chickadee-progress-step>
  <chickadee-progress-step state="active" description="Currently in progress">
    Active
  </chickadee-progress-step>

    Inactive
  </chickadee-progress-step>
</chickadee-progress-stepper>
