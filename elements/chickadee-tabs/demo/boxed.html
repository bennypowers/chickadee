<meta itemprop="name" content="Boxed">

  <chickadee-tab slot="tab" panel="second">Second</chickadee-tab>
  <chickadee-tab slot="tab" panel="third">Third</chickadee-tab>
  <chickadee-tab-panel name="first"><p>First panel content.</p></chickadee-tab-panel>
  <chickadee-tab-panel name="second" hidden><p>Second panel content.</p></chickadee-tab-panel>
  <chickadee-tab-panel name="third" hidden><p>Third panel content.</p></chickadee-tab-panel>
</chickadee-tabs>

  import '@chickadee/elements/chickadee-tabs/chickadee-tabs.js';
