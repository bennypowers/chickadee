<meta itemprop="name" content="Disabled">
<meta itemprop="description" content="Tabs with a disabled tab that cannot be selected.">

<chickadee-tabs>
  <chickadee-tab slot="tab" selected panel="active">Active</chickadee-tab>
  <chickadee-tab slot="tab" panel="another">Another</chickadee-tab>
  <chickadee-tab slot="tab" panel="off-limits" disabled>Off limits</chickadee-tab>
  <chickadee-tab-panel name="active"><p>This tab is active.</p></chickadee-tab-panel>
  <chickadee-tab-panel name="another" hidden><p>Another tab's content.</p></chickadee-tab-panel>
  <chickadee-tab-panel name="off-limits" hidden><p>You should not be able to reach this panel.</p></chickadee-tab-panel>
</chickadee-tabs>

<script type="module">
  import '@chickadee/elements/chickadee-tabs/chickadee-tabs.js';
