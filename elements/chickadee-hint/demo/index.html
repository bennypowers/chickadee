<!-- Demonstrates hint status variants (neutral, info, success, warning, danger) and the dismissable option. -->
<chickadee-hint>This is a neutral hint with some helpful information.</chickadee-hint>
<chickadee-hint status="info">This is an info hint.</chickadee-hint>
<chickadee-hint status="success">This is a success hint.</chickadee-hint>
<chickadee-hint status="warning">This is a warning hint.</chickadee-hint>
<chickadee-hint status="danger">This is a danger hint.</chickadee-hint>
<chickadee-hint status="info" dismissable>This hint can be dismissed.</chickadee-hint>

<script type="module">
  import '@chickadee/elements/chickadee-hint/chickadee-hint.js';
</script>
