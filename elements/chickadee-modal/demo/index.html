<meta itemprop="description" content="Basic modal with heading, body, and footer buttons.">
<chickadee-button onclick="document.querySelector('#demo-modal').open = true">Open modal</chickadee-button>

<chickadee-modal id="demo-modal" heading="Modal title">
  <p>This is the modal body content. It can contain any elements.</p>
  <chickadee-button slot="footer" variant="secondary"
    onclick="this.closest('chickadee-modal').open = false">Cancel</chickadee-button>
  <chickadee-button slot="footer"
    onclick="this.closest('chickadee-modal').open = false">Confirm</chickadee-button>
</chickadee-modal>

<script type="module">
  import '@chickadee/elements/chickadee-modal/chickadee-modal.js';
  import '@chickadee/elements/chickadee-button/chickadee-button.js';
</script>
