shadow:
  $type: shadow
  sm:
    $value: "0 1px 4px 0 rgba(21, 21, 21, 0.15)"
    $description: >-
      Small shadow for subtle elevation. Used for card hover effects and
      sticky elements.
  md:
    $value: "0 4px 8px 1px rgba(21, 21, 21, 0.2)"
    $description: >-
      Medium shadow for moderate elevation. Used for raised cards and
      dropdown menus.
  lg:
    $value: "0 8px 16px 2px rgba(21, 21, 21, 0.25)"
    $description: >-
      Large shadow for high elevation. Used for modal dialogs.
  xl:
    $value: "0 16px 24px 4px rgba(21, 21, 21, 0.3)"
    $description: >-
      Extra-large shadow for maximum elevation. Used for popovers and
      menus rendered on top of modals.
