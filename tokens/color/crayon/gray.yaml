color:
  $type: color
  gray:
    "10":
      $value: "#f2f2f2"
      $description: >-
        Lightest neutral surface. Should be used for subtle background
        differentiation on light themes. Recommended for elements like disabled
        button fills or secondary surface backgrounds.
    "20":
      $value: "#e0e0e0"
      $description: >-
        Light neutral border and track color. Should be used for spinner tracks,
        subtle dividers, and disabled button fills on light themes.
    "30":
      $value: "#c7c7c7"
      $description: >-
        Medium-light neutral. Should be used for default tertiary button borders
        and subtle interactive boundaries on light themes.
    "40":
      $value: "#a3a3a3"
      $description: >-
        Medium neutral. Should be used for disabled text and icon colors on
        light themes. It must meet minimum contrast requirements against light
        surfaces for non-text indicators.
    "50":
      $value: "#707070"
      $description: >-
        Mid neutral. Should be used for disabled text and icon colors on dark
        themes, and for default tertiary button borders on dark themes.
    "60":
      $value: "#4d4d4d"
      $description: >-
        Medium-dark neutral. Recommended for secondary text or muted content
        on light themes.
    "70":
      $value: "#383838"
      $description: >-
        Dark neutral. Should be used for spinner tracks and disabled fills on
        dark themes.
    "90":
      $value: "#1f1f1f"
      $description: >-
        Darkest neutral text color. Should be used as the primary text color on
        light themes and as the inverse text color on dark themes.
    "95":
      $value: "#151515"
      $description: >-
        Near-black surface. Recommended for the darkest surface backgrounds.
