color:
  $type: color
  yellow:
    "10":
      $value: "#fff3cd"
      $description: >-
        Lightest yellow. Should be used for warning status surface tints and
        alert backgrounds.
    "20":
      $value: "#ffe072"
      $description: >-
        Light yellow. Should be used for warning status hover states on dark
        themes.
    "40":
      $value: "#dca614"
      $description: >-
        Medium yellow. Should be used for warning status hover states on light
        themes.
